<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>440 Hz Chromatic Tuner — j0ey-code</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tunerV2-style.css">
</head>
<body>

<div class="tuner-housing" id="tunerHousing">

<!-- a href webpage link to my blog's project page would go here; a href="projects.html", removed here to package alone as stand-alone webpage application -->
  <a href="projects.html" id="returnBtn" class="return-btn" aria-label="Return to Previous Page" title="Return">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  </a>
 
  <div class="overlay" id="overlay">
    <div class="overlay-icon" id="overlayIcon">🎤</div>
    <div class="overlay-title" id="overlayTitle">Microphone Access Required</div>
    <div class="overlay-text" id="overlayText">
      This tuner needs permission to listen through your microphone. Your audio is processed entirely in-browser and is never recorded or transmitted.
    </div>
  </div>
 
  <div class="header">
    <div class="brand">
      <div class="brand-name">Chromatic</div>
      <div class="brand-sub">Precision Tuner</div>
    </div>
    <div class="ref-pitch">A4 = <span>440</span> Hz</div>
  </div>
 
  <div class="gauge-container">
    <div class="note-display idle" id="noteDisplay">
      <div>
        <span class="note-letter" id="noteLetter">—</span>
        <span class="note-accidental" id="noteAccidental"></span>
        <span class="note-octave" id="noteOctave"></span>
      </div>
      <div class="frequency-readout" id="freqReadout">— Hz</div>
    </div>
 
    <div class="cents-gauge">
      <div class="cents-track"></div>
      <div class="cents-ticks" id="centsTicks"></div>
      <div class="cents-center-mark"></div>
      <div class="cents-needle" id="centsNeedle"></div>
    </div>
    <div class="cents-labels">
      <span class="cents-label flat">♭ FLAT</span>
      <span class="cents-value" id="centsValue">0 ¢</span>
      <span class="cents-label sharp">SHARP ♯</span>
    </div>
  </div>
 
  <div class="chromatic-strip" id="chromaticStrip"></div>
 
  <div class="volume-meter">
    <span class="volume-label">Level</span>
    <div class="volume-bar-track">
      <div class="volume-bar-fill" id="volumeFill"></div>
    </div>
  </div>
 
  <button class="start-btn" id="startBtn">
    <span class="dot"></span>
    <span id="btnLabel">Start Tuner</span>
  </button>
 
  <div class="footer">12-Tone Chromatic Tuner Web App</div>
</div>
<script src="assets/scripts/tunerV2.js"></script>
</body>
</html>
